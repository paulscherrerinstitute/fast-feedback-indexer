schema_version: 1

context:
  version: 1.1.3

package:
  name: ffbidx
  version: ${{ version }}

source:
  url: https://github.com/paulscherrerinstitute/fast-feedback-indexer/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a71db9e076630f409b7329b85ee70870d124f3008de32f60da561bf3955bcc3b

build:
  number: 0
  script:
    - export SP_DIR=${PREFIX}$(${BUILD_PREFIX}/bin/python -c 'import site; import os; bp=os.environ["BUILD_PREFIX"]; print(site.getsitepackages()[0][len(bp):])')
    - export CUDA_HOME="${BUILD_PREFIX}"
    - export PKG_CONFIG_PATH="${BUILD_PREFIX}/share/pkgconfig"
    - echo "using CUDA_HOME=${CUDA_HOME}"
    - echo "build PREFIX=${PREFIX}"
    - echo "site-pkg SP_DIR=${SP_DIR}"
    - meson setup --reconfigure ${MESON_ARGS} -Ddefault_library=shared -Dinclude-python-api=enabled meson
    - meson compile -C meson
    - meson install -C meson
    - echo "mkdir -p ${SP_DIR}"
    - mkdir -p "${SP_DIR}"
    - echo "mv ${PREFIX}/lib/ffbidx ${SP_DIR}"
    - mv "${PREFIX}/lib/ffbidx" "${SP_DIR}"
    - echo "rm -rf ${PREFIX}/share/ffbidx"
    - rm -rf "${PREFIX}/share/ffbidx"
    - echo "rm -rf ${PREFIX}/include"
    - rm -rf "${PREFIX}/include"

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cuda-compiler
    - meson
    - pkg-config
    - numpy

  host:
    - python
    - numpy
    - eigen
    - cuda-cudart-dev # [cuda_compiler_version]

  run:
    - python
    - numpy
    - cuda-cudart # [cuda_compiler_version]

tests:
  - package_contents:
      files:
        - lib/libfast_indexer.so
        - lib/*/site-packages/ffbidx/__init__.py

about:
  license: BSD-3-Clause
  license_file: LICENSE.md
  summary: Fast feedback indexer library with python module for xray crystallography
  description: |
    Fast feedback indexer library with the python module for xray crystallography.
    Paper reference: https://doi.org/10.1107/S1600576724003182
    Code repository: https://github.com/paulscherrerinstitute/fast-feedback-indexer
  homepage: https://github.com/paulscherrerinstitute/fast-feedback-indexer
  repository: https://github.com/paulscherrerinstitute/fast-feedback-indexer
  documentation: https://github.com/paulscherrerinstitute/fast-feedback-indexer/blob/main/python/README.md

extra:
  recipe-maintainers:
    - hcstadler
